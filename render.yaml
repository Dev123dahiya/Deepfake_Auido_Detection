services:
  - type: web
    name: deepfake-audio-detector
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: MODEL_PATH
        value: outputs/deepfake_detector_enhanced_final.h5
      - key: MODEL_URL
        sync: false
      - key: AUDIT_LOG_PATH
        value: outputs/security_audit.jsonl
